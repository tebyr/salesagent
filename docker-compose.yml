services:
  # =============================================
  # API Principal
  # =============================================
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Dentro del contenedor, postgres y redis son hostname de servicio (no localhost)
      DATABASE_URL: postgresql+asyncpg://salesagent:password@postgres:5432/salesagent_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # =============================================
  # Celery Worker (procesa tareas en background)
  # =============================================
  celery-worker:
    build: .
    command: celery -A app.scheduler.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://salesagent:password@postgres:5432/salesagent_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # =============================================
  # Celery Beat (scheduler de tareas periodicas)
  # =============================================
  celery-beat:
    build: .
    command: celery -A app.scheduler.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://salesagent:password@postgres:5432/salesagent_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # =============================================
  # Frontend Panel Admin (Next.js)
  # =============================================
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    profiles:
      - dev
    restart: unless-stopped

  # =============================================
  # Celery Flower (monitor de tareas - solo dev)
  # =============================================
  celery-flower:
    build: .
    command: celery -A app.scheduler.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
    profiles:
      - dev
    restart: unless-stopped

  # =============================================
  # PostgreSQL
  # =============================================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: salesagent_db
      POSTGRES_USER: salesagent
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesagent -d salesagent_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # Redis (cache + broker de Celery)
  # =============================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
